<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Control Financiero - Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .chart-slice { transition: all 0.3s ease; cursor: pointer; }
        .chart-slice:hover { filter: brightness(1.1); transform: scale(1.02); transform-origin: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Helper para iconos
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const StatCard = ({ title, value, iconName, iconColor, color, subtitle, highlight }) => (
            <div className={`bg-white p-5 rounded-2xl shadow-sm border-b-4 ${color} transition-all`}>
                <div className="flex justify-between items-start mb-2">
                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{title}</span>
                    <Icon name={iconName} className={iconColor} size={18} />
                </div>
                <div className={`text-xl font-black ${highlight ? 'text-rose-600' : 'text-slate-800'}`}>
                    ${value.toLocaleString(undefined, { minimumFractionDigits: 2 })}
                </div>
                {subtitle && <div className="text-[10px] text-slate-400 font-medium">{subtitle}</div>}
            </div>
        );

        const App = () => {
            // --- ESTADO ---
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('finance_transactions');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [savingTargetPercent, setSavingTargetPercent] = useState(() => 
                parseInt(localStorage.getItem('finance_target_percent')) || 20
            );
            
            const [sheetUrl, setSheetUrl] = useState(() => 
                localStorage.getItem('finance_sheet_url') || ''
            );

            // Filtro de Fecha (Default mes actual)
            const now = new Date();
            const [filterDate, setFilterDate] = useState({
                month: now.getMonth(),
                year: now.getFullYear()
            });

            const [syncStatus, setSyncStatus] = useState('idle');
            const [formData, setFormData] = useState({
                date: now.toISOString().split('T')[0],
                desc: '',
                category: 'Vivienda',
                type: 'Gasto',
                source: 'Banco',
                amount: ''
            });

            // Persistencia
            useEffect(() => localStorage.setItem('finance_transactions', JSON.stringify(transactions)), [transactions]);
            useEffect(() => localStorage.setItem('finance_target_percent', savingTargetPercent.toString()), [savingTargetPercent]);
            useEffect(() => localStorage.setItem('finance_sheet_url', sheetUrl), [sheetUrl]);

            // --- FILTRADO ---
            const filteredTransactions = useMemo(() => {
                return transactions.filter(t => {
                    const d = new Date(t.date);
                    return d.getUTCMonth() === filterDate.month && d.getUTCFullYear() === filterDate.year;
                });
            }, [transactions, filterDate]);

            // --- CÁLCULOS ---
            const totals = useMemo(() => {
                const income = filteredTransactions.filter(t => t.type === 'Ingreso').reduce((acc, t) => acc + t.amount, 0);
                const expenses = filteredTransactions.filter(t => t.type === 'Gasto').reduce((acc, t) => acc + t.amount, 0);
                const actualSavings = filteredTransactions.filter(t => t.type === 'Ahorro').reduce((acc, t) => acc + t.amount, 0);
                const targetSavingsAmount = (income * savingTargetPercent) / 100;
                const available = income - expenses - actualSavings;
                return { income, expenses, actualSavings, targetSavingsAmount, available };
            }, [filteredTransactions, savingTargetPercent]);

            // Datos para Gráfico de Torta
            const pieData = useMemo(() => {
                const expenseByCat = {};
                filteredTransactions.filter(t => t.type === 'Gasto').forEach(t => {
                    expenseByCat[t.category] = (expenseByCat[t.category] || 0) + t.amount;
                });
                
                const colors = {
                    'Vivienda': '#6366f1',
                    'Alimentación': '#f59e0b',
                    'Transporte': '#10b981',
                    'Ocio': '#ec4899',
                    'Salud': '#ef4444',
                    'Inversión': '#8b5cf6',
                    'Otros': '#64748b',
                    'Sueldo': '#22c55e'
                };

                return Object.entries(expenseByCat).map(([name, value]) => ({
                    name, value, color: colors[name] || '#94a3b8'
                })).sort((a, b) => b.value - a.value);
            }, [filteredTransactions]);

            // SVG Pie Chart Generator
            const renderPieChart = () => {
                if (pieData.length === 0) return (
                    <div className="h-48 flex items-center justify-center text-slate-400 text-sm italic">
                        Sin gastos en este mes
                    </div>
                );

                const total = pieData.reduce((acc, curr) => acc + curr.value, 0);
                let cumulativeAngle = 0;
                
                return (
                    <div className="flex flex-col md:flex-row items-center gap-6 py-4">
                        <svg viewBox="0 0 32 32" className="w-40 h-40 transform -rotate-90">
                            {pieData.map((slice, i) => {
                                const angle = (slice.value / total) * 100;
                                const strokeDasharray = `${angle} 100`;
                                const strokeDashoffset = -cumulativeAngle;
                                cumulativeAngle += angle;
                                return (
                                    <circle
                                        key={i}
                                        r="16" cx="16" cy="16"
                                        fill="transparent"
                                        stroke={slice.color}
                                        strokeWidth="10"
                                        strokeDasharray={strokeDasharray}
                                        strokeDashoffset={strokeDashoffset}
                                        className="chart-slice"
                                    />
                                );
                            })}
                        </svg>
                        <div className="flex-1 space-y-2 w-full">
                            {pieData.map((slice, i) => (
                                <div key={i} className="flex items-center justify-between text-xs">
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 rounded-full" style={{backgroundColor: slice.color}}></div>
                                        <span className="font-medium text-slate-600">{slice.name}</span>
                                    </div>
                                    <span className="font-bold text-slate-800">
                                        ${slice.value.toLocaleString()} ({((slice.value/total)*100).toFixed(1)}%)
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const addTransaction = (e) => {
                e.preventDefault();
                if (!formData.amount || !formData.desc) return;
                const newTransaction = { ...formData, id: Date.now(), amount: parseFloat(formData.amount) };
                setTransactions([newTransaction, ...transactions]);
                setFormData({ ...formData, desc: '', amount: '' });
            };

            const deleteTransaction = (id) => {
                if (window.confirm('¿Eliminar este registro?')) {
                    setTransactions(transactions.filter(t => t.id !== id));
                }
            };

            const exportToSheets = async () => {
                if (!sheetUrl) return alert("Configura la URL de Google Apps Script.");
                setSyncStatus('loading');
                try {
                    await fetch(sheetUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(transactions) });
                    setSyncStatus('success');
                    setTimeout(() => setSyncStatus('idle'), 3000);
                } catch (e) { setSyncStatus('error'); setTimeout(() => setSyncStatus('idle'), 3000); }
            };

            const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto">
                    {/* Header */}
                    <header className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-3 rounded-2xl shadow-indigo-200 shadow-lg">
                                <Icon name="wallet" className="text-white" size={28} />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">FinancialPro</h1>
                                <div className="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                    Local Sync activo
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-wrap items-center gap-3">
                            {/* Filtro de Mes */}
                            <div className="flex items-center bg-white border border-slate-200 rounded-xl p-1 shadow-sm">
                                <select 
                                    className="bg-transparent text-sm font-bold p-2 outline-none cursor-pointer"
                                    value={filterDate.month}
                                    onChange={(e) => setFilterDate({...filterDate, month: parseInt(e.target.value)})}
                                >
                                    {months.map((m, i) => <option key={i} value={i}>{m}</option>)}
                                </select>
                                <select 
                                    className="bg-transparent text-sm font-bold p-2 outline-none cursor-pointer border-l border-slate-100"
                                    value={filterDate.year}
                                    onChange={(e) => setFilterDate({...filterDate, year: parseInt(e.target.value)})}
                                >
                                    {[2023, 2024, 2025, 2026].map(y => <option key={y} value={y}>{y}</option>)}
                                </select>
                            </div>

                            <button 
                                onClick={exportToSheets}
                                className={`px-4 py-2.5 rounded-xl font-bold text-xs transition-all flex items-center gap-2 ${
                                    syncStatus === 'success' ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-white hover:bg-slate-900'
                                }`}
                            >
                                <Icon name={syncStatus === 'loading' ? 'refresh-cw' : 'cloud-upload'} size={14} className={syncStatus === 'loading' ? 'animate-spin' : ''} />
                                {syncStatus === 'success' ? 'Sincronizado' : 'Backup Cloud'}
                            </button>
                        </div>
                    </header>

                    {/* Dashboard Grid */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* Panel Izquierdo: Resumen y Form */}
                        <div className="lg:col-span-4 space-y-8">
                            <section className="grid grid-cols-2 gap-4">
                                <StatCard title="Ingresos" value={totals.income} iconName="trending-up" iconColor="text-emerald-500" color="border-emerald-500" />
                                <StatCard title="Gastos" value={totals.expenses} iconName="trending-down" iconColor="text-rose-500" color="border-rose-500" />
                                <StatCard title="Ahorro" value={totals.actualSavings} iconName="piggy-bank" iconColor="text-amber-500" color="border-amber-500" subtitle={`Meta: ${savingTargetPercent}%`} />
                                <StatCard title="Balance" value={totals.available} iconName="pie-chart" iconColor="text-indigo-500" color="border-indigo-500" highlight={totals.available < 0} />
                            </section>

                            {/* Gráfico de Torta */}
                            <section className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <h3 className="text-sm font-black uppercase text-slate-400 mb-4 flex items-center gap-2">
                                    <Icon name="pie-chart" size={16} /> Distribución de Gastos
                                </h3>
                                {renderPieChart()}
                            </section>

                            {/* Formulario */}
                            <section className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <h3 className="text-sm font-black uppercase text-slate-400 mb-6 flex items-center gap-2">
                                    <Icon name="plus" size={16} /> Nuevo Movimiento
                                </h3>
                                <form onSubmit={addTransaction} className="space-y-4">
                                    <input 
                                        type="text" className="w-full p-3 rounded-xl bg-slate-50 border-none text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                        placeholder="¿En qué gastaste?" value={formData.desc} onChange={(e) => setFormData({...formData, desc: e.target.value})} required
                                    />
                                    <div className="grid grid-cols-2 gap-3">
                                        <input 
                                            type="number" step="0.01" className="w-full p-3 rounded-xl bg-slate-50 border-none text-sm focus:ring-2 focus:ring-indigo-500 outline-none font-bold"
                                            placeholder="Monto" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} required
                                        />
                                        <select className="w-full p-3 rounded-xl bg-slate-50 border-none text-sm font-bold" value={formData.type} onChange={(e) => setFormData({...formData, type: e.target.value})}>
                                            <option value="Ingreso">Ingreso</option>
                                            <option value="Gasto">Gasto</option>
                                            <option value="Ahorro">Ahorro</option>
                                        </select>
                                    </div>
                                    <select className="w-full p-3 rounded-xl bg-slate-50 border-none text-sm" value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})}>
                                        <option value="Sueldo">Sueldo / Nómina</option>
                                        <option value="Vivienda">Vivienda / Renta</option>
                                        <option value="Alimentación">Alimentación / Super</option>
                                        <option value="Transporte">Transporte / Gasolina</option>
                                        <option value="Ocio">Ocio / Restaurantes</option>
                                        <option value="Inversión">Inversión / Bolsa</option>
                                        <option value="Salud">Salud / Seguros</option>
                                        <option value="Otros">Otros</option>
                                    </select>
                                    <input type="date" className="w-full p-3 rounded-xl bg-slate-50 border-none text-sm" value={formData.date} onChange={(e) => setFormData({...formData, date: e.target.value})} />
                                    <button type="submit" className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all text-sm uppercase tracking-widest">
                                        Registrar
                                    </button>
                                </form>
                            </section>
                        </div>

                        {/* Panel Derecho: Historial */}
                        <div className="lg:col-span-8 space-y-6">
                            <div className="flex items-center justify-between">
                                <h2 className="text-xl font-black text-slate-800">
                                    Movimientos de {months[filterDate.month]}
                                </h2>
                                <span className="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black uppercase tracking-widest">
                                    {filteredTransactions.length} items
                                </span>
                            </div>

                            <div className="space-y-3 max-h-[700px] overflow-y-auto pr-2 custom-scrollbar">
                                {filteredTransactions.length > 0 ? filteredTransactions.map(t => (
                                    <div key={t.id} className="group bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between transition-all hover:shadow-md hover:border-indigo-100">
                                        <div className="flex items-center gap-5">
                                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${
                                                t.type === 'Ingreso' ? 'bg-emerald-50 text-emerald-600' : 
                                                t.type === 'Ahorro' ? 'bg-amber-50 text-amber-600' : 'bg-rose-50 text-rose-600'
                                            }`}>
                                                <Icon name={t.type === 'Ingreso' ? 'arrow-up-right' : t.type === 'Ahorro' ? 'piggy-bank' : 'arrow-down-left'} size={24} />
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-slate-800 text-sm">{t.desc}</h4>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <span className="text-[10px] font-black text-slate-400 uppercase">{t.category}</span>
                                                    <span className="text-[10px] text-slate-300">•</span>
                                                    <span className="text-[10px] font-medium text-slate-400 italic">{t.date}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-6">
                                            <div className="text-right">
                                                <div className={`text-lg font-black ${
                                                    t.type === 'Ingreso' ? 'text-emerald-500' : 
                                                    t.type === 'Ahorro' ? 'text-amber-500' : 'text-slate-800'
                                                }`}>
                                                    {t.type === 'Ingreso' ? '+' : '-'}${t.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}
                                                </div>
                                                <div className="text-[9px] font-bold text-slate-300 uppercase tracking-widest">{t.source}</div>
                                            </div>
                                            <button onClick={() => deleteTransaction(t.id)} className="p-2 text-slate-200 hover:text-rose-500 transition-colors">
                                                <Icon name="trash-2" size={18} />
                                            </button>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="flex flex-col items-center justify-center py-32 bg-white rounded-3xl border border-dashed border-slate-200 text-slate-400">
                                        <Icon name="inbox" size={48} className="mb-4 opacity-20" />
                                        <p className="font-bold text-sm">No hay registros para este mes</p>
                                        <p className="text-xs">Usa el formulario para empezar</p>
                                    </div>
                                )}
                            </div>

                            {/* Configuración */}
                            <div className="bg-slate-900 rounded-3xl p-8 text-white flex flex-col md:flex-row items-center justify-between gap-6 overflow-hidden relative">
                                <div className="relative z-10">
                                    <h4 className="text-lg font-black mb-1">Configuración Avanzada</h4>
                                    <p className="text-slate-400 text-xs mb-4">Ajusta tu meta de ahorro y conexión a la nube.</p>
                                    <div className="flex flex-col sm:flex-row gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-500 uppercase">Meta de ahorro (%)</label>
                                            <input 
                                                type="number" value={savingTargetPercent} 
                                                onChange={(e) => setSavingTargetPercent(e.target.value)}
                                                className="w-24 bg-slate-800 border-none rounded-lg p-2 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500"
                                            />
                                        </div>
                                        <div className="space-y-1 flex-1">
                                            <label className="text-[10px] font-bold text-slate-500 uppercase">Script URL (Sheets)</label>
                                            <input 
                                                type="text" placeholder="https://script.google.com/..." 
                                                className="w-full bg-slate-800 border-none rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"
                                                value={sheetUrl} onChange={(e) => setSheetUrl(e.target.value)}
                                            />
                                        </div>
                                    </div>
                                </div>
                                <Icon name="settings" size={150} className="absolute -right-10 -bottom-10 text-white opacity-5" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
